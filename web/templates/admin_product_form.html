{% extends "admin_base.html" %}

{% block title %}{% if product %}编辑商品{% else %}新建商品{% endif %}{% endblock %}

{% block admin_content %}
<div class="row">
  <div class="col-md-8">
    <h2>{% if product %}编辑商品 #{{ product.id }}{% else %}新建商品{% endif %}</h2>
    <form method="post">
      <div class="mb-3">
        <label class="form-label">名称</label>
        <input type="text" name="name" class="form-control" value="{{ product.name if product }}" />
      </div>
      <div class="mb-3">
        <label class="form-label">价格</label>
        <input type="number" step="0.01" name="price" class="form-control" value="{{ product.price if product }}" />
      </div>
      <div class="mb-3">
        <label class="form-label">销量</label>
        <input type="number" name="sales" class="form-control" value="{{ product.sales if product }}" />
      </div>
      <div class="mb-3">
        <label class="form-label">类目</label>
        <input type="text" name="category" class="form-control" value="{{ product.category if product }}" />
      </div>
      <div class="mb-3">
        <label class="form-label">链接</label>
        <input type="text" name="url" class="form-control" value="{{ product.url if product }}" />
      </div>
      <div class="mt-3">
        <button type="submit" class="btn btn-primary">保存</button>
        <a class="btn btn-secondary" href="{{ url_for('admin.products') }}">取消</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
